<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>
    <script type="module" src="script.js" defer></script>
</head>
<body>

    <div class="parent">
        <div class="box div1">
            <div class="nav-icons">
                <i class="fa-solid fa-comments" title="Chat y Amigos"></i>
                <i class="fa-solid fa-store" title="Tienda"></i>
                <i class="fa-solid fa-suitcase" title="Mochila"></i>
                <i class="fa-solid fa-book-open" title="Misiones"></i>
                <i class="fa-brands fa-fort-awesome" title="Reinos"></i>
                <i class="fa-solid fa-masks-theater" title="Roleplay"></i>
                
                <div class="separator"></div>
                
                <div class="create-realm" title="Nuevo Reino">
                    <i class="fa-solid fa-plus"></i>
                </div>
            </div>
        </div>

        <div class="box div2 topbar">
            <div class="topbar-left">
                <h2 class="logo">Loopz</h2>
                <i class="fa-solid fa-compass" title="Descubrir"></i>
                <i class="fa-solid fa-ellipsis" title="Más opciones"></i>
            </div>
            
            <div class="topbar-center">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Buscar en Loopz">
                </div>
            </div>

            <div class="topbar-right">
                <i class="fa-solid fa-bell" title="Notificaciones"></i>
                <i class="fa-solid fa-user-plus" title="Solicitudes"></i>
                <div class="profile-pic"></div>
                <i class="fa-solid fa-gear" title="Opciones"></i>
            </div>
        </div>

        <div class="box div3 feed-container">
            <div class="feed-placeholder">3</div>
            <div style="height: 2000px;"></div> 
        </div>

        <div class="right-column">
            
            <div class="box div4">
                <div class="trends-widget">
                    <h3 class="trends-title">Tendencias para ti</h3>
                    
                    <div class="trend-item">
                        <span class="trend-cat">Noticias</span>
                        <div class="trend-content">
                            <i class="fa-solid fa-newspaper"></i>
                            <p>Información no disponible</p>
                        </div>
                    </div>

                    <div class="trend-item">
                        <span class="trend-cat">Hashtags</span>
                        <div class="trend-content">
                            <p class="tag-highlight">Información no disponible</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="box div5">
                <div class="trends-widget">
                    <h3 class="trends-title">Reinos Populares</h3>
                    <div class="trend-item">
                        <span class="trend-cat">Roleplay</span>
                        <div class="trend-content">
                            <i class="fa-solid fa-dragon"></i>
                            <p>Información no disponible</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="box div6">
                 <div class="trends-widget">
                    <h3 class="trends-title">Música en Tendencia</h3>
                    <div class="trend-item">
                        <span class="trend-cat">Música</span>
                        <div class="trend-content">
                            <i class="fa-solid fa-music"></i>
                            <p>Información no disponible</p>
                        </div>
                    </div>
                </div>
            </div>

        </div> </div> </body>
</html>
